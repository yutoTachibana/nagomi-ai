<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf5e8"/>
      <stop offset="100%" stop-color="#f3e6d2"/>
    </linearGradient>
  </defs>

  <!-- 紙のような背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 太陽 + 8 方向の光線 (中心に集まる) -->
  <g transform="translate(256 256)">
    <!-- 斜め方向の小さめテラコッタ三角 (NE, SE, SW, NW) -->
    <g fill="#d68f78">
      <path d="M 113,-113 L 60,-95 L 95,-60 Z"/>
      <path d="M 113,113 L 95,60 L 60,95 Z"/>
      <path d="M -113,113 L -60,95 L -95,60 Z"/>
      <path d="M -113,-113 L -95,-60 L -60,-95 Z"/>
    </g>

    <!-- 縦横方向のセージ三角 (N, E, S, W) -->
    <g fill="#7a8c6e">
      <path d="M 0,-178 L -22,-66 L 22,-66 Z"/>
      <path d="M 178,0 L 66,-22 L 66,22 Z"/>
      <path d="M 0,178 L 22,66 L -22,66 Z"/>
      <path d="M -178,0 L -66,22 L -66,-22 Z"/>
    </g>

    <!-- 中心の太陽 -->
    <circle cx="0" cy="0" r="68" fill="#e8a87a"/>
  </g>
</svg>
