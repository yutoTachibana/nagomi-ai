services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: komorebi
      POSTGRES_USER: komorebi
      POSTGRES_PASSWORD: komorebi_dev
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komorebi"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
