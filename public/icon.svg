<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#fff5e6" stop-opacity="1"/>
      <stop offset="60%" stop-color="#faf6ef" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5ede0" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8a878" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#c47a5a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c47a5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leaf1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7a8c6e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a8c6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leaf2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8a4a5c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8a4a5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 紙のような背景 -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- 木漏れ日 - 太陽 -->
  <circle cx="155" cy="135" r="135" fill="url(#sun)"/>

  <!-- 葉影 (セージ) -->
  <ellipse cx="380" cy="200" rx="130" ry="170" fill="url(#leaf1)" transform="rotate(-15 380 200)"/>

  <!-- 葉影 (プラム) -->
  <ellipse cx="320" cy="400" rx="150" ry="120" fill="url(#leaf2)" transform="rotate(20 320 400)"/>

  <!-- "こ" の明朝体 -->
  <text
    x="256"
    y="350"
    font-family="'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif"
    font-size="240"
    font-weight="500"
    text-anchor="middle"
    fill="#2a2826"
    letter-spacing="0"
  >こ</text>
</svg>
